name: Publish from Octarine

on:
  schedule:
    - cron: '*/30 * * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync-posts:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout blog repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Checkout Octarine-Docs
        uses: actions/checkout@v4
        with:
          repository: m0rfiin-m/Octarine-Docs
          token: ${{ secrets.OCTARINE_PAT }}
          path: octarine-source

      - name: Copy published posts
        run: |
          mkdir -p content/posts
          CHANGED=false
          for file in octarine-source/Blog-Ready/*.md; do
            [ -f "$file" ] || continue
            if grep -q "published: true" "$file"; then
              filename=$(basename "$file")
              dest="content/posts/$filename"
              if [ ! -f "$dest" ] || ! diff -q "$file" "$dest" > /dev/null 2>&1; then
                cp "$file" "$dest"
                CHANGED=true
              fi
            fi
          done
      