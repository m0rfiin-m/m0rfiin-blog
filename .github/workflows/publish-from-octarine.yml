name: Publish from Octarine

on:
  schedule:
    - cron: '*/30 * * * *'
  workflow_dispatch:

permissions:
  contents: write
  actions: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  sync-posts:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout blog repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Checkout Octarine-Docs
        uses: actions/checkout@v4
        with:
          repository: m0rfiin-m/Octarine-Docs
          token: ${{ secrets.OCTARINE_PAT }}
          path: octarine-source

      - name: Copy published posts
        run: |
          mkdir -p content/posts
          CHANGED=false
          for file in octarine-source/Blog-Ready/*.md; do
            [ -f "$file" ] || continue
            if grep -q "published: true" "$file"; then
              filename=$(basename "$file")
              dest="content/posts/$filename"
              if [ ! -f "$dest" ] || ! diff -q <(tr -d '\r' < "$file") <(tr -d '\r' < "$dest") > /dev/null 2>&1; then
                tr -d '\r' < "$file" > "$dest"
                CHANGED=true
                echo "Queued: $filename"
              else
                echo "Unchanged: $filename"
              fi
            fi
          done
          echo "CHANGED=$CHANGED" >> $GITHUB_ENV

      - name: Commit and push new posts
        if: env.CHANGED == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add content/posts/
          git commit -m "sync: publish new posts from Octarine"
          for i in 1 2 3; do
            if git push; then
              echo "Push succeeded on attempt $i"
              break
            fi
            echo "Push attempt $i failed, rebasing and retrying..."
            git pull --rebase origin main
          done

      - name: Trigger deploy
        if: env.CHANGED == 'true'
        run: gh workflow run deploy.yml
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
