{{ define "main" }}
<div class="container">
    <article class="post">
        <header class="post-header">
            <span class="post-type-label">{{ with .Params.category }}{{ . }}{{ else }}Work{{ end }}</span>
            <h1>{{ .Title }}</h1>

            <div class="post-meta">
                {{ with .Params.role }}<span>{{ . }}</span>{{ end }}
                {{ with .Params.period }}<span>&middot; {{ . }}</span>{{ end }}
                {{ if .Params.tags }}
                <span class="tags">
                    {{ range .Params.tags }}
                    <span class="tag">#{{ . }}</span>
                    {{ end }}
                </span>
                {{ end }}
            </div>
        </header>

        <div class="content">
            {{ .Content }}
        </div>
    </article>
</div>
{{ end }}
